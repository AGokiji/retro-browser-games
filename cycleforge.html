// ── Pure SVG charts ─────────────────────────────────────────────────────────
function SVGLine(props) {
  var data = props.data;
  var keys = props.keys;
  var h = props.h || 160;
  var w = 600;
  var pad = {t:16, b:28, l:36, r:16};
  var iw = w - pad.l - pad.r;
  var ih = h - pad.t - pad.b;

  var allVals = [];
  data.forEach(function(d){
    keys.forEach(function(k){ if(d[k.key]!=null) allVals.push(d[k.key]); });
  });
  var mn = Math.min.apply(null, allVals);
  var mx = Math.max.apply(null, allVals);
  var range = mx - mn || 1;

  function px(i){ return pad.l + (i/(data.length-1||1))*iw; }
  function py(v){ return pad.t + (1-(v-mn)/range)*ih; }

  return (
    <svg viewBox={"0 0 "+w+" "+h} style={{width:"100%",height:h}}>
      {[0,0.25,0.5,0.75,1].map(function(t,i){
        var y = pad.t + t*ih;
        return <line key={i} x1={pad.l} x2={w-pad.r} y1={y} y2={y} stroke={C.border} strokeWidth={0.5}/>;
      })}
      {data.map(function(d,i){
        return (
          <text key={i} x={px(i)} y={h-4} textAnchor="middle" fontSize={8} fill={C.muted}>
            {d.week||d.label||""}
          </text>
        );
      })}
      {keys.map(function(k){
        var pts = data.map(function(d,i){
          if(d[k.key]==null) return null;
          return px(i)+","+py(d[k.key]);
        }).filter(Boolean).join(" ");
        return (
          <polyline key={k.key} points={pts} fill="none"
            stroke={k.color} strokeWidth={k.w||2}
            strokeDasharray={k.dash?"4 2":undefined} strokeOpacity={0.9}/>
        );
      })}
      {keys.map(function(k){
        return data.map(function(d,i){
          if(d[k.key]==null) return null;
          return <circle key={k.key+i} cx={px(i)} cy={py(d[k.key])} r={2.5} fill={k.color}/>;
        });
      })}
    </svg>
  );
}

function SVGBar(props) {
  var data = props.data;
  var h = props.h || 140;
  var w = 600;
  var pad = {t:12, b:28, l:8, r:8};
  var iw = w - pad.l - pad.r;
  var ih = h - pad.t - pad.b;
  var mx = Math.max.apply(null, data.map(function(d){ return d.tss||0; })) || 1;
  var bw = iw/data.length*0.7;

  return (
    <svg viewBox={"0 0 "+w+" "+h} style={{width:"100%",height:h}}>
      {data.map(function(d,i){
        var x = pad.l + (i+0.5)*(iw/data.length) - bw/2;
        var bh = ((d.tss||0)/mx)*ih;
        var y = pad.t + ih - bh;
        var col = PHASE_COLOR[d.phase]||C.accent;
        return (
          <g key={i}>
            <rect x={x} y={y} width={bw} height={bh}
              fill={col} opacity={d.planned?0.4:0.85} rx={2}/>
            {i%4===0 && (
              <text x={x+bw/2} y={h-4} textAnchor="middle" fontSize={7} fill={C.muted}>
                {d.label}
              </text>
            )}
          </g>
        );
      })}
    </svg>
  );
}

        <div>
          {/* KPI row */}
          <div style={{display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, marginBottom:12}}>
            {[
              {val:current.ctl, label:"CTL (Fitness)", color:C.blue},
              {val:current.atl, label:"ATL (Fatigue)",  color:C.red},
              {val:current.tsb, label:"TSB (Form)",     color:current.tsb>=0?C.green:C.yellow},
              {val:weekTSS,     label:"TSS неделя",     color:C.accent},
            ].map(function(s,i){
              return (
                <Card key={i} style={{marginBottom:0}}>
                  <Stat val={s.val} label={s.label} color={s.color}/>
                </Card>
              );
            })}
          </div>

          {/* PMC chart */}
          <Card>
            <CardTitle>📈 Performance Management Chart</CardTitle>
            <SVGLine
              data={pmcData}
              keys={[
                {key:"ctl",  color:C.blue,   w:2},
                {key:"atl",  color:C.red,    w:2},
                {key:"tsb",  color:C.green,  w:1.5},
              ]}
              h={180}
            />
            <div style={{display:"flex", gap:12, marginTop:6}}>
              {[{c:C.blue,l:"CTL — Fitness"},{c:C.red,l:"ATL — Fatigue"},{c:C.green,l:"TSB — Form"}].map(function(x,i){
                return (
                  <div key={i} style={{display:"flex", alignItems:"center", gap:4, fontSize:9, color:C.muted}}>
                    <div style={{width:16, height:2, background:x.c, borderRadius:1}}/>
                    {x.l}
                  </div>
                );
              })}
            </div>
          </Card>

          {/* Week quick view */}
          <Card>
            <CardTitle>📋 Неделя 16–22 марта — быстрый вид</CardTitle>
            <div style={{display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:8, marginBottom:10}}>
              <Stat val={weekDone+"/"+thisWeek.length} label="Выполнено" color={C.green}/>
              <Stat val={weekTSS} label="TSS" color={C.accent}/>
            </div>
            {thisWeek.map(function(s,i){
              return (
                <SessionRow key={i} s={s} onClick={function(){
                  setSelectedSession(s); setTab("workout");
                }}/>
              );
            })}
          </Card>

          {/* Macrocycle mini */}
          <Card>
            <CardTitle>📅 Макроцикл (TSS по неделям)</CardTitle>
            <SVGBar data={MACRO} h={120}/>
          </Card>
        </div>
      )}

      {/* ── CALENDAR ──────────────────────────────────────────────────────── */}
      {tab === "calendar" && (
        <div>
          <Card>
            <CardTitle>📅 Макроцикл</CardTitle>
            {MACRO.map(function(m,i){
              var col = PHASE_COLOR[m.phase]||C.accent;
              return (
                <div key={i} style={{
                  display:"flex", alignItems:"center", gap:8,
                  padding:"5px 0", borderBottom:"1px solid "+C.border,
                  opacity:m.planned?0.6:1,
                }}>
                  <div style={{width:3, height:20, background:col, borderRadius:2, flexShrink:0}}/>
                  <div style={{fontSize:10, color:C.muted, width:40, flexShrink:0}}>{m.label}</div>
                  <div style={{flex:1, height:8, background:C.border, borderRadius:4, overflow:"hidden"}}>
                    <div style={{
                      width:(m.tss/420*100)+"%", height:"100%",
                      background:col, borderRadius:4, opacity:m.planned?0.6:1,
                    }}/>
                  </div>
                  <div style={{fontSize:10, color:C.dim, width:30, textAlign:"right"}}>{m.tss}</div>
                  <Badge color={col} style={{fontSize:8}}>{m.phase}</Badge>
                </div>
              );
            })}
          </Card>

          <Card>
            <CardTitle>📋 Неделя 16–22 марта (текущая)</CardTitle>
            {thisWeek.map(function(s,i){
              return (
                <SessionRow key={i} s={s} onClick={function(){
                  setSelectedSession(s); setTab("workout");
                }}/>
              );
            })}
          </Card>

          <Card>
            <CardTitle>📋 Неделя 9–15 марта (прошлая)</CardTitle>
            {prevWeek.map(function(s,i){
              return (
                <SessionRow key={i} s={s} onClick={function(){
                  setSelectedSession(s); setTab("workout");
                }}/>
              );
            })}
          </Card>
        </div>
      )}

      {/* ── WORKOUT ───────────────────────────────────────────────────────── */}
      {tab === "workout" && (
        <div>
          {selectedSession ? (
            <div>
              <button onClick={function(){ setSelectedSession(null); }}
                style={{
                  background:"none", border:"1px solid "+C.border, color:C.muted,
                  padding:"5px 12px", borderRadius:7, fontSize:11, cursor:"pointer", marginBottom:12,
                }}>
                ← Назад
              </button>

              <Card>
                <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", marginBottom:12}}>
                  <div>
                    <div style={{fontSize:15, fontWeight:800, color:C.text}}>{selectedSession.name}</div>
                    <div style={{fontSize:10, color:C.muted, marginTop:2}}>
                      {selectedSession.date} · {selectedSession.dow} · {selectedSession.zone}
                    </div>
                    {selectedSession.description && (
                      <div style={{fontSize:10, color:C.yellow, marginTop:4, fontWeight:600}}>
                        🏆 {selectedSession.description}
                      </div>
                    )}
                  </div>
                  <div style={{display:"flex", flexDirection:"column", gap:4, alignItems:"flex-end"}}>
                    <Badge color={selectedSession.color}>{selectedSession.zone}</Badge>
                    <Badge color={selectedSession.status==="done"?C.green:C.yellow}>
                      {selectedSession.status==="done"?"✓ Выполнено":"→ Запланировано"}
                    </Badge>
                  </div>
                </div>

                {/* Stats grid */}
                <div style={{display:"flex", flexWrap:"wrap", gap:8, marginBottom:16}}>
                  {[
                    {l:"Длительность", v:selectedSession.duration>0?selectedSession.duration+"мин":"—"},
                    {l:"Avg Power",    v:selectedSession.avg?selectedSession.avg+"Вт":"—"},
                    {l:"NP",          v:selectedSession.np?selectedSession.np+"Вт":"—"},
                    {l:"Avg HR",      v:selectedSession.hr?selectedSession.hr+"bpm":"—"},
                    {l:"Каденс",      v:selectedSession.cad?selectedSession.cad+"rpm":"—"},
                    {l:"RPE",         v:selectedSession.rpe!=null?selectedSession.rpe+"/10":"—"},
                    {l:"TSS",         v:selectedSession.tss!=null?selectedSession.tss:"—"},
                  ].map(function(st,i){
                    return (
                      <div key={i} style={{
                        background:C.bg, borderRadius:8, padding:"8px 12px",
                        border:"1px solid "+C.border, minWidth:80,
                      }}>
                        <div style={{fontSize:8, color:C.muted}}>{st.l}</div>
                        <div style={{fontSize:14, fontWeight:700, color:C.text}}>{st.v}</div>
                      </div>
                    );
                  })}
                </div>

                {/* Structure */}
                <CardTitle>🗂 Структура тренировки</CardTitle>
                {selectedSession.structure.map(function(seg,i){
                  return (
                    <div key={i} style={{
                      display:"flex", alignItems:"center", gap:10, padding:"7px 10px",
                      marginBottom:4, borderRadius:8,
                      background:seg.color+"09", border:"1px solid "+seg.color+"22",
                    }}>
                      <div style={{width:3, height:28, background:seg.color, borderRadius:2, flexShrink:0}}/>
                      <div style={{flex:1}}>
                        <div style={{fontSize:11, fontWeight:600, color:C.text}}>{seg.label}</div>
                        <div style={{fontSize:9, color:C.muted}}>{seg.time}</div>
                      </div>
                      <div style={{fontSize:11, color:seg.color, fontWeight:700}}>{seg.power}</div>
                    </div>
                  );
                })}
              </Card>
            </div>
          ) : (
            <Card>
              <CardTitle>🔍 Выберите тренировку</CardTitle>
              <div style={{color:C.muted, fontSize:11, marginBottom:12}}>
                Нажмите на тренировку в Дашборде или Календаре, чтобы открыть детали.
              </div>
              <div style={{fontSize:11, color:C.dim, fontWeight:600, marginBottom:8}}>Эта неделя:</div>
              {thisWeek.map(function(s,i){
                return (
                  <SessionRow key={i} s={s} onClick={function(){ setSelectedSession(s); }}/>
                );
              })}
              <div style={{fontSize:11, color:C.dim, fontWeight:600, margin:"12px 0 8px"}}>Прошлая неделя:</div>
              {prevWeek.map(function(s,i){
                return (
                  <SessionRow key={i} s={s} onClick={function(){ setSelectedSession(s); }}/>
                );
              })}
            </Card>
          )}
        </div>
      )}

      {/* ── ZONES ─────────────────────────────────────────────────────────── */}
      {tab === "zones" && (
        <div>
          <Card>
            <CardTitle>🎯 FTP и зоны мощности</CardTitle>

            {/* FTP display / edit */}
            <div style={{
              display:"flex", alignItems:"center", gap:12,
              padding:"12px 14px", borderRadius:10,
              background:C.accent+"11", border:"1px solid "+C.accent+"33",
              marginBottom:16,
            }}>
              <div style={{flex:1}}>
                <div style={{fontSize:9, color:C.muted}}>Текущий FTP</div>
                <div style={{fontSize:24, fontWeight:800, color:C.accent}}>{ftp} Вт</div>
                <div style={{fontSize:9, color:C.muted}}>
                  {(ftp/76.7).toFixed(2)} Вт/кг при 76.7 кг
                </div>
              </div>
              {!editFtp ? (
                <button onClick={function(){ setEditFtp(true); setFtpInput(String(ftp)); }}
                  style={{
                    background:C.accent, color:"#fff", border:"none",
                    padding:"6px 14px", borderRadius:8, fontSize:11, cursor:"pointer",
                  }}>
                  Изменить
                </button>
              ) : (
                <div style={{display:"flex", gap:6, alignItems:"center"}}>
                  <input type="number" value={ftpInput}
                    onChange={function(e){ setFtpInput(e.target.value); }}
                    style={{width:70}}/>
                  <button onClick={function(){
                    var v = parseInt(ftpInput);
                    if(!isNaN(v) && v>0){ setFtp(v); }
                    setEditFtp(false);
                  }}
                    style={{
                      background:C.green, color:"#fff", border:"none",
                      padding:"5px 10px", borderRadius:7, fontSize:11, cursor:"pointer",
                    }}>
                    ОК
                  </button>
                  <button onClick={function(){ setEditFtp(false); }}
                    style={{
                      background:"none", border:"1px solid "+C.border, color:C.muted,
                      padding:"5px 10px", borderRadius:7, fontSize:11, cursor:"pointer",
                    }}>
                    ✕
                  </button>
                </div>
              )}
            </div>

            {/* Zone table */}
            {FTP_ZONES.map(function(z,i){
              var lo = null, hi = null;
              if(z.name==="Z1"){ lo=0;           hi=Math.round(ftp*0.55); }
              if(z.name==="Z2"){ lo=Math.round(ftp*0.55); hi=Math.round(ftp*0.75); }
              if(z.name==="Z3"){ lo=Math.round(ftp*0.76); hi=Math.round(ftp*0.87); }
              if(z.name==="Z4"){ lo=Math.round(ftp*0.88); hi=Math.round(ftp*0.95); }
              if(z.name==="Z5"){ lo=Math.round(ftp*0.96); hi=Math.round(ftp*1.05); }
              if(z.name==="Z6"){ lo=Math.round(ftp*1.06); hi=Math.round(ftp*1.20); }
              if(z.name==="Z7"){ lo=Math.round(ftp*1.21); hi=null; }
              return (
                <div key={i} style={{
                  display:"flex", alignItems:"center", gap:8,
                  padding:"8px 10px", borderRadius:8, marginBottom:4,
                  background:z.bg, border:"1px solid "+z.color+"22",
                }}>
                  <div style={{width:3, height:28, background:z.color, borderRadius:2, flexShrink:0}}/>
                  <div style={{minWidth:30, color:z.color, fontSize:13, fontWeight:800}}>{z.name}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:11, fontWeight:600, color:C.text}}>{z.label}</div>
                    <div style={{fontSize:9, color:C.muted}}>{z.pct}</div>
                  </div>
                  <div style={{fontSize:11, fontWeight:700, color:z.color}}>
                    {lo!=null && hi!=null ? lo+"–"+hi+" Вт" : lo!=null ? ">"+lo+" Вт" : ""}
                  </div>
                </div>
              );
            })}
          </Card>

          {/* FTP History */}
          <Card>
            <CardTitle>📈 История FTP</CardTitle>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%", borderCollapse:"collapse", fontSize:11}}>
                <thead>
                  <tr style={{borderBottom:"1px solid "+C.border}}>
                    {["Дата","Тест","FTP","Δ"].map(function(h,i){
                      return <th key={i} style={{textAlign:"left",padding:"5px 8px",color:C.muted,fontWeight:600}}>{h}</th>;
                    })}
                  </tr>
                </thead>
                <tbody>
                  {FTP_HISTORY.map(function(t,i){
                    return (
                      <tr key={i} style={{borderBottom:"1px solid "+C.border+"66"}}>
                        <td style={{padding:"6px 8px", color:C.muted}}>{t.date}</td>
                        <td style={{padding:"6px 8px", color:C.dim}}>{t.type}</td>
                        <td style={{padding:"6px 8px", fontWeight:700, color:C.accent}}>{t.ftp} Вт</td>
                        <td style={{padding:"6px 8px", color:t.delta>0?C.green:t.delta<0?C.red:C.muted}}>
                          {t.delta===0?"±0":typeof t.delta==="number"?(t.delta>0?"+":"")+t.delta:"—"}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>

          {/* Profile */}
          <Card>
            <CardTitle>🚴 Профиль гонщика</CardTitle>
            <div style={{display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:8}}>
              {[
                ["Вес","76.7 кг"],["Рост","179 см"],
                ["Возраст","30 лет"],["Команда","Ganymede CC"],
                ["Старт проекта","04.08.2025"],["Целевая гонка","Три Горы 9–11.05"],
                ["Макс HR","195 bpm"],["Rest HR","45 bpm"],
              ].reduce(function(acc,p,i){
                if(i%2===0) acc.push([p]);
                else acc[acc.length-1].push(p);
                return acc;
              },[]).map(function(pair,ri){
                return (
                  <React.Fragment key={ri}>
                    {pair.map(function(p,ci){
                      return (
                        <div key={ci} style={{
                          padding:"8px 10px", borderRadius:8,
                          border:"1px solid "+C.border,
                        }}>
                          <div style={{fontSize:10, color:C.muted}}>{p[0]}</div>
                          <div style={{fontSize:12, fontWeight:600, color:C.text}}>{p[1]}</div>
                        </div>
                      );
                    })}
                  </React.Fragment>
                );
              })}
            </div>
          </Card>
        </div>
      )}

      {/* ── ANALYTICS ─────────────────────────────────────────────────────── */}
      {tab === "analytics" && (
        <div>
          {/* PMC Chart */}
          <Card>
            <CardTitle>📈 PMC — CTL / ATL / TSB</CardTitle>
            <SVGLine
              data={pmcData}
              keys={[
                {key:"ctl", color:C.blue,  w:2},
                {key:"atl", color:C.red,   w:2},
                {key:"tsb", color:C.green, w:1.5},
              ]}
              h={200}
            />
          </Card>

          {/* Recovery */}
          <Card>
            <CardTitle>💤 HRV и восстановление (7–18 марта)</CardTitle>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%", borderCollapse:"collapse", fontSize:11}}>
                <thead>
                  <tr style={{borderBottom:"1px solid "+C.border}}>
                    {["Дата","HRV","RHR","Сон","RPE"].map(function(h,i){
                      return <th key={i} style={{textAlign:"left",padding:"5px 8px",color:C.muted,fontWeight:600}}>{h}</th>;
                    })}
                  </tr>
                </thead>
                <tbody>
                  {RECOVERY_ROWS.map(function(row,i){
                    return (
                      <tr key={i} style={{borderBottom:"1px solid "+C.border+"66"}}>
                        {row.map(function(cell,j){
                          return <td key={j} style={{padding:"7px 10px", color:C.dim}}>{cell}</td>;
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </Card>

          {/* Nutrition */}
          <Card>
            <CardTitle>🍎 Питание — анализ</CardTitle>
            <Alert color={C.green} icon="✅" text="15.03 (гонка): питание 2650 ккал, профицит +180. Правильный день!"/>
            <Alert color={C.red}   icon="⚠️" text="16.03: белок 122г (норма 150-170г) + профицит 810 ккал в лёгкий день. Перевёрнутый баланс."/>
            <Alert color={C.red}   icon="⚠️" text="17.03 (Threshold-день): дефицит 1099 ккал. Ключевые дни — дефицит 0–200 максимум!"/>
          </Card>

          {/* Zone distribution */}
          <Card>
            <CardTitle>🎯 Распределение по зонам (текущая неделя)</CardTitle>
            {FTP_ZONES.map(function(z,i){
              var pct = [18, 35, 15, 18, 8, 4, 2][i] || 0;
              return (
                <div key={i} style={{display:"flex", alignItems:"center", gap:8, marginBottom:6}}>
                  <div style={{fontSize:11, color:C.dim, minWidth:24}}>{z.name}</div>
                  <div style={{flex:1, height:8, background:C.border, borderRadius:4, overflow:"hidden"}}>
                    <div style={{width:pct+"%", height:"100%", background:z.color, borderRadius:4}}/>
                  </div>
                  <div style={{fontSize:10, color:C.muted, minWidth:28, textAlign:"right"}}>{pct}%</div>
                </div>
              );
            })}
          </Card>

          {/* Weekly TSS trend */}
          <Card>
            <CardTitle>📊 TSS по неделям (макроцикл)</CardTitle>
            <SVGBar data={MACRO} h={150}/>
          </Card>
        </div>
      )}

      {/* Footer */}
      <div style={{textAlign:"center", fontSize:10, color:C.muted, paddingTop:16, borderTop:"1px solid "+C.border}}>
        CycleForge · Ganymede Coach · Старт: 04.08.2025 · FTP {ftp} Вт · 🏆 Три Горы 9–11 мая 2026
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
